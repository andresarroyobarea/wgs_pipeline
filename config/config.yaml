# Units file
units: "units.tsv"

# Dirs
TMPDIR: "/home/andres/Escritorio/bioinfo_hematology_unit/novalign_optimization/tmp_files" # Temporary dir.
genome_index: "workflow/resources/hg38_dbsnp146_M5.ndx" # Genome dir. 

# Wrappers
wrapper:
  qc: "v7.2.0/bio/fastqc"
  multiqc: "v7.2.0/bio/multiqc"

# Environments
envs: 
  picard: "/home/andres/Escritorio/bioinfo_hematology_unit/novalign_optimization/workflow/envs/picard.yaml"
  samtools: "/home/andres/Escritorio/bioinfo_hematology_unit/novalign_optimization/workflow/envs/samtools.yaml"

# Human genome
hg_version: "hg38"

# Panel
panel: "Adaptive"

# Squencing platform
seq_platform: "Illumina"

read: ["R1", "R2"]

# Parameters
parameters:

  qc:

    extra: "--adapters workflow/resources/FastQC/adapter_list.txt"

  novoalign:

    extra: ""

  novosort:

    extra: "--markduplicates"

  add_replace_rg:

    extra: "CREATE_INDEX=true SORT_ORDER=coordinate"
  
  merge_bams:

    extra: "-c -O BAM"


# Resources.
resources:
    default:
        threads: 2
        mem_mb:  2000
        runtime: 170
    qc:
        threads: 8
        mem_mb:  2970
        runtime: 60
    
    novoalign:
        threads: 30
        mem_mb:  20000
        runtime: 10
      
    novosort:
      threads: 2
      mem_mb: 20000
      runtime: 10

    add_replace_rg:
        threads: 2
        mem_mb:  3000
        runtime: 10

    merge_bams:
        threads: 5
        mem_mb:  8000
        runtime: 10